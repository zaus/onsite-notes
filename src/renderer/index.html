<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Onsite Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <button id="btn-timestamp" title="Insert Timestamp (F9)">⏱ Timestamp</button>
    <button id="btn-endday" title="End Day (Ctrl+F9)">📅 End Day</button>
    <button id="btn-analysis" title="Analysis (F1)">📊 Analysis</button>
    <span id="current-time"></span>
  </div>
  <div id="main-area">
    <div id="editor-container"></div>
    <div id="sidebar" class="hidden">
      <div id="sidebar-header">
        <span id="sidebar-title">Links</span>
        <button id="sidebar-close">✕</button>
      </div>
      <div id="sidebar-content"></div>
    </div>
  </div>
  <div id="status-bar">
    <span id="status-file"></span>
    <span id="status-time"></span>
  </div>

  <!-- Analysis Modal -->
  <div id="analysis-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Analysis</h2>
        <button id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="analysis-controls">
          <label><input type="radio" name="analysis-range" value="today" checked> Today</label>
          <label><input type="radio" name="analysis-range" value="week"> Last 7 days</label>
          <label><input type="radio" name="analysis-range" value="custom"> Custom range</label>
          <span class="analysis-separator">|</span>
          <label><input type="radio" name="analysis-format" value="html" checked> HTML</label>
          <label><input type="radio" name="analysis-format" value="text"> Text</label>
          <div id="custom-range" class="hidden">
            <input type="date" id="range-start">
            <span>to</span>
            <input type="date" id="range-end">
          </div>
          <button id="run-analysis">Run</button>
        </div>
        <div id="analysis-output"></div>
      </div>
    </div>
  </div>

  <div id="prompt-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Prompt Title</h2>
      </div>
      <div class="modal-body">
        <div class="modal-row">
          <label for="prompt-input">Prompt Input</label>
          <input id="prompt-input" type="text" placeholder="home-life" autofocus>
          <div class="validation hidden" aria-live="polite"></div>
        </div>
        <div class="modal-actions">
          <button class="cancel" data-cancel>Cancel</button>
          <button class="confirm" data-confirm>Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <div id="autocomplete-container"></div>

  <script src="app.bundle.js"></script>
</body>
</html>
