<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Onsite Notes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="llmSearch.css">
</head>
<body>
  <div id="toolbar">
    <section class="left">
      <button id="btn-timestamp" title="Insert Timestamp (F9)">⏱ Timestamp</button>
      <button id="btn-endday" title="End Day (Ctrl+F9)">📅 End Day</button>
      <button id="btn-analysis" title="Analysis (F1)">📊 Analysis</button>
      <button id="btn-search" title="Search (F3)">🔍 Search</button>
    </section>
    <section class="right">
      <!-- ↑↓ ▲▼ △▽ -->
      <button id="btn-prev-editor" title="Jump to previous editor (Ctrl+Up)">↑</button>
      <button id="btn-next-editor" title="Jump to next editor (Ctrl+Down)">↓</button>
      <button id="btn-editor-end" title="Jump to end of latest editor (Ctrl+F7)">⏭</button>
      <button id="btn-load-more" title="Load older entries">Load More Days</button>
      <span id="current-time"></span>
    </section>
  </div>
  <div id="main-area">
    <div id="editor-container"></div>

    <div id="sidebar" class="hidden">
      <div id="sidebar-resize"></div>
      <div id="sidebar-header">
        <span id="sidebar-title">Links</span>
        <button id="sidebar-close">✕</button>
      </div>
      <div id="sidebar-content"></div>
    </div>
  </div>
  <div id="status-bar">
    <span id="status-file"></span>
    <span id="status-time"></span>
  </div>

  <div id="app-modal" class="modal hidden">
    <div id="app-modal-content" class="modal-content">
      <div class="modal-header">
        <h2 id="app-modal-title">Modal</h2>
        <button id="app-modal-close">✕</button>
      </div>
      <div id="app-modal-body" class="modal-body"></div>
      <div class="modal-actions">
        <button class="cancel" id="app-modal-cancel" data-cancel>Cancel</button>
        <button class="confirm" id="app-modal-confirm" data-confirm>Confirm</button>
      </div>
    </div>
  </div>

  <template id="analysis-modal-template">
    <div class="analysis-modal-content">
      <div id="analysis-controls">
          <label><input type="radio" name="analysis-range" value="today" checked> Today</label>
          <label><input type="radio" name="analysis-range" value="week"> Last 7 days</label>
          <label><input type="radio" name="analysis-range" value="custom"> Custom range</label>
          <span class="analysis-separator">|</span>
          <label><input type="radio" name="analysis-format" value="html" checked> HTML</label>
          <label><input type="radio" name="analysis-format" value="text"> Text</label>
          <div id="custom-range" class="hidden">
            <input type="date" id="range-start">
            <span>to</span>
            <input type="date" id="range-end">
          </div>
      </div>
      <div id="analysis-output"></div>
    </div>
  </template>

  <template id="prompt-modal-template">
    <div class="prompt-modal-content">
      <div class="modal-row">
        <label for="prompt-input">Prompt Input</label>
        <input id="prompt-input" type="text" placeholder="home-life" autofocus>
        <div class="validation hidden" aria-live="polite"></div>
      </div>
    </div>
  </template>

  <div id="autocomplete-container"></div>

  <script src="app.bundle.js"></script>
</body>
</html>
